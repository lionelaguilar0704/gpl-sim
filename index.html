<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Great Pirate Life Sim</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Great Pirate Life Sim</h1>
        <p>Randomized pirate-era life simulator</p>
      </div>
      <button id="saveBtn">Save</button>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="wanted">
          <h2>WANTED</h2>
          <div id="portrait">☠️</div>
          <h3 id="posterName">UNKNOWN</h3>
          <p>DEAD OR ALIVE</p>
          <h4 id="posterBounty">฿0</h4>
        </section>

        <section class="card">
          <h3>Status</h3>
          <div class="line"><span>Age</span><b id="age">—</b></div>
          <div class="line"><span>Origin</span><b id="origin">—</b></div>
          <div class="line"><span>Path</span><b id="path">Undecided</b></div>
          <div class="line"><span>Sea</span><b id="sea">—</b></div>
          <div class="line"><span>Berries</span><b id="berries">0</b></div>
          <div class="line"><span>Fruit</span><b id="fruit">None</b></div>
          <div class="line"><span>Haki</span><b id="haki">Dormant</b></div>
        </section>

        <section class="card">
          <h3>Stats</h3>
          <div id="stats"></div>
        </section>
      </aside>

      <section class="main">
        <section id="screen" class="screen"></section>

        <nav class="tabs">
          <button onclick="showTab('life')">Life</button>
          <button onclick="showTab('crew')">Crew</button>
          <button onclick="showTab('world')">World</button>
          <button onclick="showTab('log')">Log</button>
        </nav>

        <section id="tab" class="card"></section>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
