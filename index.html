<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Great Pirate Life Sim v8.9</title>
  <link rel="manifest" href="manifest.json?v=70" />
  <link rel="stylesheet" href="styles.css?v=89" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <h1>Great Pirate Life Sim <span>v8.9</span></h1>
        <p>Core Bugfix + Stable Birth Flow</p>
      </div>
      <div class="topActions">
        <button id="saveBtn">Save</button>
        <button id="helpBtn">Help</button>
        <button id="newBtn" class="danger">New</button>
      </div>
    </header>

    <main class="layout">
      <aside class="leftPanel">
        <section class="wanted" id="wantedPoster"></section>
        <section class="dashboard" id="dashboard"></section>
      </aside>

      <section class="mainPanel">
        <div id="screen" class="screen"></div>
        <nav class="tabs" id="tabs"></nav>
        <section id="tab" class="tabPanel"></section>
      </section>
    </main>

    <nav class="bottomNav">
      <button onclick="careerRoleMenu()">Role</button>
      <button onclick="assetsMenu()">Assets</button>
      <button class="ageBubble" onclick="ageUp()">+<br><span>Age</span></button>
      <button onclick="relationshipsMenu()">Social</button>
      <button onclick="mainMenu()">More</button>
    </nav>
  </div>

  <div id="toastWrap"></div>

  <script src="game-data.js?v=89"></script>
  <script src="script.js?v=89"></script>
</body>
</html>
